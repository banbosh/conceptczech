<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a237e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Systém — Concept Czech</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ==================== LOGIN SCREEN ==================== -->
  <div id="login-screen">
    <div class="login-box">
      <div class="login-logo">Systém</div>
      <div class="login-subtitle">Concept Czech s.r.o.</div>

      <form id="login-form" class="login-form" autocomplete="off">
        <div class="form-group">
          <label class="form-label" for="login-phone">Telefonní číslo</label>
          <input class="form-input login-input" type="tel" id="login-phone" placeholder="+420 xxx xxx xxx" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Heslo</label>
          <div style="position:relative">
            <input class="form-input login-input" type="password" id="login-password" placeholder="Heslo" required style="padding-right:44px">
            <button type="button" id="toggle-password" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#999;font-size:18px;padding:0;line-height:1" title="Zobrazit heslo">👁</button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block login-submit" id="btn-login">Přihlásit se</button>
        <div class="login-forgot">
          <a href="#" id="forgot-password-link">Zapomenuté heslo?</a>
        </div>
        <div class="login-forgot-info hidden" id="forgot-password-info">
          Kontaktujte administratora pro reset hesla.
        </div>
      </form>

      <div class="login-error" id="login-error"></div>
      <div class="login-pending" id="login-pending" data-i18n="loginPending">
        Váš účet čeká na schválení adminem.
      </div>
    </div>
  </div>

  <!-- ==================== APP SHELL ==================== -->
  <div id="app-shell">

    <!-- Header -->
    <header class="app-header">
      <button class="header-hamburger" id="btn-hamburger" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
      <div class="header-logo">Concept Czech</div>
      <div class="header-actions">
        <div class="header-weather" id="header-weather"></div>
        <button class="lang-switch" id="btn-lang">CS</button>
        <div class="header-user" id="header-user-btn">
          <img class="header-avatar" id="header-avatar" src="" alt="">
          <span class="header-username" id="header-username"></span>
        </div>
      </div>
      <div class="user-menu" id="user-menu">
        <button class="user-menu-item" id="btn-change-password">Změnit heslo</button>
        <button class="user-menu-item" id="btn-logout" data-i18n="logout">Odhlásit se</button>
      </div>
    </header>

    <!-- Hamburger drawer (mobile) -->
    <div class="drawer-overlay hidden" id="drawer-overlay"></div>
    <nav class="drawer hidden" id="drawer-nav">
      <div class="drawer-header">
        <div class="drawer-logo">Concept Czech</div>
        <button class="drawer-close" id="drawer-close">&times;</button>
      </div>
      <div class="drawer-user" id="drawer-user-info"></div>
      <div class="drawer-divider"></div>
      <button class="drawer-item" data-module="tasks">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Úkoly
      </button>
      <button class="drawer-item" data-module="board">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        Nástěnka
      </button>
      <button class="drawer-item" data-module="clients">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="2" width="18" height="20" rx="2"/><circle cx="12" cy="10" r="3"/><path d="M7 18c0-2.2 2.2-4 5-4s5 1.8 5 4"/></svg>
        Kadeřníci
      </button>
      <button class="drawer-item" data-module="calendar">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Kalendář
      </button>
      <button class="drawer-item" data-module="team">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Tým
      </button>
      <button class="drawer-item" data-module="stats">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        Pohoda
      </button>
      <button class="drawer-item" data-module="productivity">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        Statistiky
      </button>
      <button class="drawer-item" data-module="shipments">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        Zásilky
      </button>
      <button class="drawer-item" data-module="admin" id="drawer-admin">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        Admin
      </button>
      <div class="drawer-divider"></div>
      <button class="drawer-item drawer-item-logout" id="drawer-logout">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        Odhlásit se
      </button>
    </nav>

    <!-- Sidebar (desktop) -->
    <nav class="sidebar" id="sidebar-nav">
      <button class="nav-item active" data-module="tasks">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        <span class="nav-label" data-i18n="navTasks">Úkoly</span>
      </button>
      <button class="nav-item" data-module="board">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
        <span class="nav-label" data-i18n="navBoard">Nástěnka</span>
        <span class="nav-badge hidden" id="board-badge-sidebar">0</span>
      </button>
      <button class="nav-item" data-module="calendar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <span class="nav-label" data-i18n="navCalendar">Kalendář</span>
      </button>
      <button class="nav-item" data-module="team">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        <span class="nav-label" data-i18n="navTeam">Tým</span>
      </button>
      <button class="nav-item" data-module="stats">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span class="nav-label" data-i18n="navStats">Pohoda</span>
      </button>
      <button class="nav-item" data-module="productivity" id="sidebar-productivity">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        <span class="nav-label">Statistiky</span>
      </button>
      <button class="nav-item" data-module="clients" id="sidebar-clients">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="2" width="18" height="20" rx="2"/><circle cx="12" cy="10" r="3"/><path d="M7 18c0-2.2 2.2-4 5-4s5 1.8 5 4"/></svg>
        <span class="nav-label" data-i18n="navClients">Kadeřníci</span>
      </button>
      <button class="nav-item" data-module="shipments" id="sidebar-shipments">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        <span class="nav-label">Zásilky</span>
      </button>
      <button class="nav-item" data-module="admin" id="sidebar-admin">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span class="nav-label">Admin</span>
      </button>
    </nav>

    <!-- Main Content -->
    <main class="app-content">
      <!-- Tasks Module -->
      <div class="module-view active" id="view-tasks"></div>

      <!-- Board Module -->
      <div class="module-view" id="view-board"></div>

      <!-- Calendar Module -->
      <div class="module-view" id="view-calendar"></div>

      <!-- Team Module -->
      <div class="module-view" id="view-team"></div>

      <!-- Stats Module -->
      <div class="module-view" id="view-stats"></div>

      <!-- Productivity Module -->
      <div class="module-view" id="view-productivity"></div>

      <!-- Clients Module -->
      <div class="module-view" id="view-clients"></div>

      <!-- Admin Module -->
      <div class="module-view" id="view-admin"></div>

      <!-- Shipments Module -->
      <div class="module-view" id="view-shipments"></div>
    </main>

    <!-- FAB -->
    <button class="fab hidden" id="fab-add" title="Přidat">+</button>

    <!-- Toast container -->
    <div class="toast-container" id="toast-container"></div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal-content"></div>
  </div>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <!-- App Scripts -->
  <script src="firebase-config.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
  <script src="tasks.js"></script>
  <script src="board.js"></script>
  <script src="calendar.js"></script>
  <script src="team.js"></script>
  <script src="admin.js"></script>
  <script src="stats.js"></script>
  <script src="productivity.js"></script>
  <script src="clients.js"></script>
  <script src="shipments.js"></script>
</body>
</html>
