<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- PWA Meta Tags -->
  <meta name="theme-color" content="#22d3ee">
  <meta name="background-color" content="#0a0e17">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Banbosh Football: Mini Soccer">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="application-name" content="Banbosh Football: Mini Soccer">
  
  <meta name="description" content="Minimalist football duel - play AI, tournament or league!">
  
  <title>Banbosh Football: Mini Soccer</title>
  
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192x192.png">
  <link rel="apple-touch-icon" href="/icons/icon-192x192.png">
  
  <style>
    * { touch-action: manipulation; }
    html, body, #root { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #0a0e17; }
  </style>
</head>
<body>
  <div id="splash" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0e17;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .5s">
    <img src="/icons/icon-192x192.png" style="width:160px;height:160px;border-radius:30px;box-shadow:0 8px 32px rgba(34,211,238,0.4);animation:bounce 1.2s infinite ease-in-out" alt="logo"/>
    <div style="color:#22d3ee;font-family:Arial;font-size:24px;font-weight:bold;margin-top:24px;letter-spacing:2px">BANBOSH FOOTBALL</div>
    <div style="color:#888;font-family:Arial;font-size:13px;margin-top:8px">Mini Soccer</div>
    <style>@keyframes bounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-15px) scale(1.05)}}</style>
  </div>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
  <script>
    // Skip service worker in native Capacitor build (assets are already bundled)
    if ('serviceWorker' in navigator && !window.Capacitor?.isNativePlatform?.()) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
